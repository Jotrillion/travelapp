<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Travel App</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .page-content {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        .page-content h2 {
            color: #14213d;
            margin-bottom: 16px;
        }
        .contact-form {
            display: grid;
            gap: 12px;
            margin-top: 10px;
        }
        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .contact-form textarea {
            min-height: 130px;
            resize: vertical;
        }
        .contact-form button {
            width: fit-content;
            background-color: #ffb703;
            color: #14213d;
            border: none;
            border-radius: 18px;
            padding: 9px 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .contact-form button:hover {
            background-color: #ffcb52;
        }
        .form-message {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .form-message.success {
            background-color: #e8f8ee;
            color: #1b7f46;
            border: 1px solid #b9e7cd;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <ul>
                    <h1>Travel App</h1>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </header>
    </div>

    <main class="page-content">
        <h2>Contact Us</h2>
        <p>Have a question or feedback? Send us a message.</p>

        <form class="contact-form" id="contactForm" action="#" method="post">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        <div id="formMessage" class="form-message" role="status" aria-live="polite"></div>
    </main>

    <footer class="social-links">
        <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
        <a href="https://x.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-x-twitter"></i></a>
        <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-youtube"></i></a>
    </footer>

    <script>
        const contactForm = document.getElementById("contactForm");
        const formMessage = document.getElementById("formMessage");

        contactForm.addEventListener("submit", function (event) {
            event.preventDefault();

            formMessage.textContent = "Message sent successfully. We will get back to you soon.";
            formMessage.className = "form-message success";

            contactForm.reset();
        });
    </script>
</body>
</html>
